name: Coherence check (link & anchor integrity)

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "scripts/coherence-check.py"
      - ".github/workflows/coherence-check.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/coherence-check.py"
      - ".github/workflows/coherence-check.yml"

permissions:
  contents: read

jobs:
  coherence:
    runs-on: ubuntu-latest
    steps:
      # Full history is required: the checker uses git log to classify a broken
      # anchor as hallucinated (never existed) vs. stale (renamed since).
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run coherence check
        run: python3 scripts/coherence-check.py
